# Worker Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fte-worker
  namespace: customer-success-fte
  labels:
    app: fte-worker
spec:
  replicas: 3
  selector:
    matchLabels:
      app: fte-worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: fte-worker
    spec:
      containers:
      - name: worker
        image: fte:latest
        imagePullPolicy: Always
        envFrom:
        - configMapRef:
            name: fte-config
        - secretRef:
            name: fte-secrets
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
        livenessProbe:
          exec:
            command:
            - pgrep
            - -f
            - message_processor.py
          initialDelaySeconds: 30
          periodSeconds: 30
