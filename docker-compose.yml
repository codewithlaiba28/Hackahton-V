services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: fte-postgres
    environment:
      POSTGRES_USER: fte_user
      POSTGRES_PASSWORD: fte_password
      POSTGRES_DB: fte_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fte_user -d fte_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  seeder:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fte-seeder
    environment:
      DATABASE_URL: postgresql://fte_user:fte_password@postgres:5432/fte_db
      CEREBRAS_API_KEY: ${CEREBRAS_API_KEY}
    volumes:
      - ./context:/context:ro
    depends_on:
      postgres:
        condition: service_healthy
    command: ["python", "database/seed_knowledge_base.py"]

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fte-backend
    environment:
      DATABASE_URL: postgresql://fte_user:fte_password@postgres:5432/fte_db
      CEREBRAS_API_KEY: ${CEREBRAS_API_KEY}
      CEREBRAS_MODEL: ${CEREBRAS_MODEL:-llama3.1-8b}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_WHATSAPP_NUMBER: ${TWILIO_WHATSAPP_NUMBER:-whatsapp:+14155238886}
      KAFKA_ENABLED: "false"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      GMAIL_POLLING_ENABLED: ${GMAIL_POLLING_ENABLED:-true}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/credentials.json:/app/credentials.json:ro
      - ./backend/token.json:/app/token.json:ro
      - ./context:/app/context:ro
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fte-frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-pYn8V7x9S4L2j9W0Q1R6T3Y5U7I9O0P1}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      DATABASE_URL: postgresql://fte_user:fte_password@postgres:5432/fte_db
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
